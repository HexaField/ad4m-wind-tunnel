# AT Protocol PDS (Personal Data Server)
# Port 2583: HTTP API
services:
  atproto-pds:
    image: ghcr.io/bluesky-social/pds:latest
    container_name: ad4m-test-atproto-pds
    ports:
      - "2583:2583"
    volumes:
      - pds-data:/pds
    environment:
      PDS_HOSTNAME: "localhost"
      PDS_PORT: "2583"
      PDS_DATA_DIRECTORY: "/pds"
      PDS_BLOBSTORE_DISK_LOCATION: "/pds/blocks"
      PDS_JWT_SECRET: "ad4m-test-jwt-secret-not-for-production"
      PDS_ADMIN_PASSWORD: "ad4m-test-admin"
      PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: ""
      PDS_DID_PLC_URL: "https://plc.directory"
      PDS_INVITE_REQUIRED: "false"
      PDS_EMAIL_SMTP_URL: ""
      PDS_EMAIL_FROM_ADDRESS: "noreply@test.local"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2583/xrpc/_health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pds-data:
