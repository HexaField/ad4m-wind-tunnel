# Nostr relay — strfry
# Port 7777: WebSocket relay endpoint
services:
  nostr-relay:
    image: dockurr/strfry:latest
    container_name: ad4m-test-nostr-relay
    ports:
      - "7777:7777"
    volumes:
      - nostr-data:/app/strfry-db
    environment:
      - STRFRY_PORT=7777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7777"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nostr-data:
