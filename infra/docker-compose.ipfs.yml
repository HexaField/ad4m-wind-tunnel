# IPFS daemon — kubo
# Port 5001: HTTP API
# Port 4001: Swarm (libp2p)
# Port 8080: Gateway (read-only)
services:
  ipfs-node:
    image: ipfs/kubo:latest
    container_name: ad4m-test-ipfs
    ports:
      - "5001:5001"
      - "4001:4001"
      - "4001:4001/udp"
      - "8080:8080"
    volumes:
      - ipfs-data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ipfs-data:
