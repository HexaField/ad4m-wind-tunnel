# Matrix homeserver — Conduit
# Port 6167: HTTP API + federation
services:
  matrix-conduit:
    image: matrixconduit/matrix-conduit:latest
    container_name: ad4m-test-matrix-conduit
    ports:
      - "6167:6167"
    volumes:
      - conduit-data:/var/lib/matrix-conduit
    environment:
      CONDUIT_SERVER_NAME: "ad4m-test.local"
      CONDUIT_PORT: "6167"
      CONDUIT_DATABASE_BACKEND: "rocksdb"
      CONDUIT_ALLOW_REGISTRATION: "true"
      CONDUIT_ALLOW_FEDERATION: "true"
      CONDUIT_TRUSTED_SERVERS: '["matrix.org"]'
      CONDUIT_ADDRESS: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6167/_matrix/client/versions"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  conduit-data:
